<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aetherwood Rally Board</title>
<link rel="icon" type="image/png" href="favicon-32.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="aetherwood_app_config.js"></script>
<style>
:root{
  --forest:#1f3328;
  --deep:#0f1f18;
  --pine:#2f4d38;
  --moss:#6f8f53;
  --fern:#a8bd7a;
  --river:#6e9ea3;
  --bark:#6b4a32;
  --soil:#3b2a1e;
  --parchment:#f2ead7;
  --paper:#fff8e8;
  --campfire:#d9903d;
  --ember:#b85b34;
  --ink:#182219;
  --muted:#65705f;
  --shadow:0 24px 70px rgba(0,0,0,.34);
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--ink);padding:18px;
  background:
    linear-gradient(rgba(15,31,24,.84),rgba(15,31,24,.92)),
    url("family-crest-bg.webp") center top/cover fixed,
    radial-gradient(circle at 20% 10%,#375940,transparent 35%),
    linear-gradient(135deg,#0f1f18,#1f3328 55%,#3a2c1f);
}
.wrap{width:min(1120px,96vw);margin:0 auto}
.nav{text-align:center;margin:8px 0 18px}.nav a{display:inline-block;margin:5px;padding:10px 13px;border-radius:999px;background:rgba(242,234,215,.94);color:var(--forest);text-decoration:none;font-weight:900;border:1px solid rgba(111,143,83,.35)}
.hero,.panel{background:linear-gradient(180deg,rgba(255,248,232,.97),rgba(242,234,215,.94));border-radius:28px;box-shadow:var(--shadow);border:1px solid rgba(168,189,122,.5)}
.hero{padding:26px;display:grid;grid-template-columns:160px 1fr;gap:18px;align-items:center;margin-bottom:18px;position:relative;overflow:hidden}
.hero:after,.panel:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 12% 0,rgba(111,143,83,.16),transparent 30%);opacity:.7}
.panel{padding:22px;margin-bottom:18px;position:relative;overflow:hidden}.crest{width:150px;border-radius:24px;box-shadow:0 0 30px rgba(217,144,61,.35);border:4px solid rgba(107,74,50,.28)}
h1{font-family:Georgia,serif;font-size:clamp(2rem,6vw,4.6rem);line-height:.94;margin:0;color:var(--forest)}
.sub{font-size:1.08rem;color:var(--muted);line-height:1.45;margin:10px 0 0}h2{font-family:Georgia,serif;margin:0 0 12px;font-size:1.7rem;color:var(--forest)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.field{display:grid;gap:6px}label{font-weight:900;color:#314433}
input,select,textarea{width:100%;border:2px solid #d8c9a9;border-radius:16px;padding:12px;font:inherit;background:#fffdf6;color:var(--ink)}textarea{min-height:84px;resize:vertical}
.btn{border:0;border-radius:999px;padding:12px 16px;font-weight:950;cursor:pointer;background:var(--forest);color:white;box-shadow:0 10px 22px rgba(0,0,0,.16)}
.btn.gold{background:linear-gradient(135deg,var(--campfire),#d7a95d);color:#2b1c11}.btn.good{background:linear-gradient(135deg,var(--moss),var(--fern));color:#102018}.btn.pink{background:linear-gradient(135deg,var(--bark),var(--ember));color:white}.btn.ghost{background:#efe4ca;color:var(--forest);border:1px solid #c9b98f}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.rallies{display:grid;gap:14px}.card{background:var(--paper);border-radius:22px;padding:16px;border-left:8px solid var(--moss);box-shadow:0 12px 28px rgba(0,0,0,.12);position:relative}.card h3{margin:0;font-size:1.35rem;color:var(--forest)}
.meta{color:var(--muted);font-weight:800;margin:6px 0 10px}.msg{background:#efe4ca;border-radius:14px;padding:11px;margin:10px 0;color:#314433;border:1px solid #dfcfaa}.people{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{border-radius:999px;background:#e6efd6;padding:7px 10px;font-weight:900;color:#203126}.status{font-size:.92rem;color:var(--muted)}.empty{font-style:italic;color:var(--muted)}
.banner{display:none;margin-bottom:18px;padding:15px 18px;border-radius:20px;background:linear-gradient(135deg,#e0a64e,#f1d17a);border:1px solid rgba(91,67,49,.35);font-weight:950;color:#2b1c11;box-shadow:0 16px 36px rgba(0,0,0,.24)}.banner.show{display:block;animation:pop .35s ease-out}.smallrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toggle{display:flex;gap:8px;align-items:center;font-weight:900}.toggle input{width:auto}.counts{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.count{background:#f5eddb;border:1px solid #d8c9a9;border-radius:999px;padding:6px 10px;font-weight:900;color:#314433}
@keyframes pop{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:720px){.hero{grid-template-columns:1fr;text-align:center}.crest{margin:auto}.actions .btn{width:100%}}
</style>
</head>
<body>
<div class="wrap">
<nav class="nav"><a href="index.html">Portal</a><a href="holiday-adventures.html">Adventures</a><a href="rally.html">Rally Board</a><a href="hide-seek.html">Hide and Seek</a><a href="memories.html">Memories</a></nav>
<div id="banner" class="banner">🏴‍☠️ New rally in town!</div>
<section class="hero"><img class="crest" src="family-crest.png" alt="Ansla Pirate Family crest"><div><h1>I'm going.<br>Is anyone coming?</h1><p class="sub">Post a mini adventure invite for the crew. Wilderness edition, less cursed nappy, more campfire noticeboard.</p></div></section>
<section class="panel">
  <h2>Family access</h2>
  <div class="grid"><div class="field"><label>Your pirate name</label><select id="person"><option>Mumgela</option><option>Dadrew</option><option>The Boy</option><option>Sparkles</option></select></div><div class="field"><label>Family code</label><input id="familyCode" placeholder="family code"></div><div class="field"><label>&nbsp;</label><button class="btn good" id="saveAccess">Save and load rallies</button></div></div>
  <p class="status" id="status">Ready.</p>
</section>
<section class="panel">
  <h2>Start a rally</h2>
  <div class="grid"><div class="field"><label>Adventure</label><input id="title" placeholder="Beach wave play, pizza making, bike ride..."></div><div class="field"><label>When</label><input type="datetime-local" id="when"></div><div class="field"><label>Where</label><input id="where" placeholder="Home, beach, cafe, secret quest zone..."></div></div>
  <div class="field" style="margin-top:10px"><label>Message</label><textarea id="message" placeholder="I'm going. Is anyone coming?"></textarea></div>
  <div class="actions"><button class="btn gold" id="createRally">Launch rally</button><button class="btn" id="refresh">Refresh board</button><button class="btn ghost" id="clearCache">Clear this device cache</button></div>
</section>
<section class="panel"><div class="smallrow" style="justify-content:space-between"><h2>Open rallies</h2><label class="toggle"><input type="checkbox" id="showExpired"> Show expired</label></div><div id="rallies" class="rallies"><p class="empty">No rallies loaded yet.</p></div></section>
</div>
<script>
const CFG=window.AETHERWOOD_CONFIG||{};const LS='aetherwood_rally_v2';let local=[];let knownIds=new Set();let firstLoad=true;let soundOn=false;
const $=id=>document.getElementById(id);function access(){return{person:$('person').value,code:$('familyCode').value.trim()||CFG.FAMILY_CODE||''}}
function syncReady(){return CFG.SCRIPT_URL&&CFG.SCRIPT_URL.includes('script.google.com')}function setStatus(t){$('status').textContent=t}
$('familyCode').value=localStorage.getItem('aetherwood_family_code')||CFG.FAMILY_CODE||'';$('person').value=localStorage.getItem('aetherwood_person')||'Mumgela';
$('saveAccess').onclick=()=>{localStorage.setItem('aetherwood_family_code',$('familyCode').value.trim());localStorage.setItem('aetherwood_person',$('person').value);loadRallies()};
$('refresh').onclick=()=>loadRallies();$('showExpired').onchange=()=>render(local);
$('clearCache').onclick=()=>{localStorage.removeItem(LS);local=[];knownIds=new Set();render([]);setStatus('This device cache has been cleared. Refreshing shared board...');loadRallies()};
$('createRally').onclick=async()=>{const a=access();const rally={rallyId:'r'+Date.now(),familyCode:a.code,person:a.person,title:$('title').value.trim(),when:$('when').value,where:$('where').value.trim(),message:$('message').value.trim()||"I'm going. Is anyone coming?",responses:{},status:'open'};if(!rally.title)return alert('Give the rally an adventure name first.');if(!rally.when)return alert('Choose a proper date and time so the 1899 goblin stays banished.');local.unshift(rally);render(local);await post({type:'rally',...rally});$('title').value='';$('when').value='';$('where').value='';$('message').value='';setStatus('Rally launched. Family chaos beacon is lit.');setTimeout(loadRallies,700)};
async function respond(rallyId,response){const a=access();const r=local.find(x=>x.rallyId===rallyId);if(r){r.responses=typeof r.responses==='string'?safeJson(r.responses):r.responses||{};r.responses[a.person]=response;render(local)}await post({type:'rsvp',familyCode:a.code,rallyId,person:a.person,response});setTimeout(loadRallies,700)}
async function closeRally(rallyId){const a=access();await post({type:'closeRally',familyCode:a.code,rallyId,person:a.person});local=local.filter(r=>r.rallyId!==rallyId);render(local);setStatus('Rally closed.')}async function deleteRally(rallyId){if(!confirm('Delete this rally for everyone?'))return;const a=access();await post({type:'deleteRally',familyCode:a.code,rallyId,person:a.person});local=local.filter(r=>r.rallyId!==rallyId);render(local);setStatus('Rally deleted.')}
function clean(items){return (items||[]).filter(r=>r&&String(r.rallyId||'').trim()&&String(r.title||'').trim()).map(r=>({...r,status:r.status||'open'}))}
function render(items){items=clean(items);const showExpired=$('showExpired').checked;const now=Date.now();let visible=items.filter(r=>r.status==='open').filter(r=>showExpired||!isExpired(r.when));if(!visible.length){$('rallies').innerHTML='<p class="empty">No open rallies. Start one and summon the crew.</p>';return}$('rallies').innerHTML=visible.map(r=>{let responses=typeof r.responses==='string'?safeJson(r.responses):r.responses||{};let counts=countResponses(responses);let people=Object.entries(responses).map(([p,v])=>`<span class="pill">${esc(v)} ${esc(p)}</span>`).join('')||'<span class="pill">No replies yet</span>';let own=(r.person||'')===access().person;return `<article class="card"><h3>${esc(r.title)}</h3><div class="meta">Started by ${esc(r.person||'Mystery pirate')} · ${prettyWhen(r.when)} ${r.where?' · '+esc(r.where):''}</div><div class="counts"><span class="count">✅ Coming ${counts.coming}</span><span class="count">🤔 Maybe ${counts.maybe}</span><span class="count">🌙 Not today ${counts.nope}</span></div><div class="msg">${esc(r.message||"I'm going. Is anyone coming?")}</div><div class="people">${people}</div><div class="actions"><button class="btn good" onclick="respond('${esc(r.rallyId)}','✅ Coming')">I'm in</button><button class="btn gold" onclick="respond('${esc(r.rallyId)}','🤔 Maybe')">Maybe</button><button class="btn pink" onclick="respond('${esc(r.rallyId)}','🌙 Not today')">Not today</button>${own?`<button class="btn ghost" onclick="closeRally('${esc(r.rallyId)}')">Close</button><button class="btn pink" onclick="deleteRally('${esc(r.rallyId)}')">Delete</button>`:''}</div></article>`}).join('')}
function countResponses(res){let vals=Object.values(res||{});return{coming:vals.filter(v=>String(v).includes('Coming')).length,maybe:vals.filter(v=>String(v).includes('Maybe')).length,nope:vals.filter(v=>String(v).includes('Not')).length}}
function isExpired(w){if(!w)return false;let d=new Date(w);if(isNaN(d))return false;return d.getTime() < Date.now()-60*60*1000}
function prettyWhen(w){if(!w)return 'Time unknown';let d=new Date(w);if(isNaN(d))return esc(w);let today=new Date();let tomorrow=new Date();tomorrow.setDate(today.getDate()+1);let same=(a,b)=>a.toDateString()===b.toDateString();let time=d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});if(same(d,today))return 'Today at '+time;if(same(d,tomorrow))return 'Tomorrow at '+time;return d.toLocaleDateString([], {weekday:'short',day:'numeric',month:'short'})+' at '+time}
function safeJson(s){try{return JSON.parse(s||'{}')}catch(e){return{}}}async function post(payload){if(!syncReady())return;try{await fetch(CFG.SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)})}catch(e){console.warn(e)}}
function loadRallies(){const a=access();if(!syncReady()){render(local);setStatus('Local rally board loaded. Add Apps Script URL for shared family sync.');return}const cb='rallyCb_'+Date.now();window[cb]=data=>{try{let rallies=clean((data&&data.rallies)||[]);let newItems=rallies.filter(r=>!knownIds.has(r.rallyId));if(!firstLoad&&newItems.length){notifyNew(newItems[0])}firstLoad=false;knownIds=new Set(rallies.map(r=>r.rallyId));local=rallies;render(local);setStatus('Shared rally board loaded. Auto refresh is on.')}finally{delete window[cb];script.remove()}};const script=document.createElement('script');script.src=CFG.SCRIPT_URL+'?action=list&code='+encodeURIComponent(a.code)+'&callback='+cb+'&t='+Date.now();document.body.appendChild(script)}
function notifyNew(r){const b=$('banner');b.textContent=`🏴‍☠️ New rally in town! ${r.person||'Someone'} posted: ${r.title}`;b.classList.add('show');if(navigator.vibrate)navigator.vibrate([180,80,180]);setTimeout(()=>b.classList.remove('show'),7000)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
loadRallies();setInterval(loadRallies,30000);
</script>
</body>
</html>
